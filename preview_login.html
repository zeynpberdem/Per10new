<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Per10 - Login Önizleme</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1E2130;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }
  .window {
    background: #1E2130;
    width: 400px;
    padding: 48px 50px;
    border-radius: 12px;
    border: 1px solid #2D3348;
  }
  .logo {
    width: 72px; height: 72px;
    background: #3A7BF7;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: bold; color: white;
    margin: 0 auto 16px;
  }
  h2 {
    color: #ECEFF4;
    text-align: center;
    font-size: 20px;
    margin-bottom: 6px;
  }
  .subtitle {
    color: #8892A4;
    text-align: center;
    font-size: 13px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    color: #8892A4;
    font-size: 12px;
    margin-bottom: 6px;
    margin-left: 2px;
  }
  .input-box {
    background: #252A3A;
    border: 1px solid #2D3348;
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .input-box input {
    width: 100%;
    background: transparent;
    border: none;
    padding: 11px 14px;
    color: #ECEFF4;
    font-size: 14px;
    font-family: 'Segoe UI', sans-serif;
    outline: none;
  }
  .input-box input::placeholder { color: #8892A4; }
  .btn-login {
    width: 100%;
    background: #3A7BF7;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 4px;
    font-family: 'Segoe UI', sans-serif;
    transition: opacity 0.15s;
  }
  .btn-login:hover { opacity: 0.88; }
  .btn-login:active { opacity: 0.75; }
  .error {
    color: #E74C3C;
    font-size: 12px;
    margin-bottom: 12px;
    display: none;
    margin-left: 2px;
  }
  .error.show { display: block; }
</style>
</head>
<body>
  <div class="window">
    <div class="logo">P10</div>
    <h2>Per10 Satış Sistemi</h2>
    <p class="subtitle">Hesabınıza giriş yapın</p>

    <label>Kullanıcı Adı</label>
    <div class="input-box">
      <input id="user" type="text" placeholder="Kullanıcı adınızı girin"/>
    </div>

    <label>Şifre</label>
    <div class="input-box">
      <input id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') giris()"/>
    </div>

    <p class="error" id="hata">Hatalı kullanıcı adı veya şifre!</p>

    <button class="btn-login" onclick="giris()">Giriş Yap</button>
  </div>

  <script>
    function giris() {
      const user = document.getElementById('user').value;
      const pass = document.getElementById('pass').value;
      if (user === 'peronyıkama' && pass === 'per1023') {
        alert('✅ Giriş Başarılı! Ana kasa ekranına yönlendiriliyorsunuz...');
      } else {
        document.getElementById('hata').classList.add('show');
        document.getElementById('pass').value = '';
      }
    }
  </script>
</body>
</html>
